  # TIER 1 — Wire services (3 feeds)
  # --------------------------------------------------------------------------
  # NOTE: Reuters removed official public RSS in 2020. The FeedBurner mirror
  # still resolves but titles itself "AllToc News" — content is Reuters wire.
  # AFP has no public RSS feed.

  - name: "Reuters World (FeedBurner mirror)"
    url: "https://feeds.feedburner.com/Reuters/worldNews"
    language: "en"
    tier: 1
    feed_type: "wire"
    country_focus: null

  # INACTIVE (H14, 2026-04-05): Reuters retired public RSS in 2020. Legacy
  # endpoint returns HTTP 404; no supported replacement is available without
  # a commercial API key. Kept here for historical context; re-enable only
  # if Reuters restores a public endpoint.
  - name: "Reuters World (official, legacy)"
    url: "https://www.reuters.com/arc/outboundfeeds/v3/all/rss.xml"
    language: "en"
    tier: 1
    feed_type: "wire"
