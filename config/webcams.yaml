# City webcam embeds for drill-down countries
# Populated 2026-04-02 via manual URL research
#
# Embed strategies by priority:
#   1. YouTube embed (most reliable for iframe in Streamlit)
#   2. SkylineWebcams page URL (may need custom embed handling)
#
# type field: "webcam" = actual city camera, "news_fallback" = 24/7 news stream
#   used as substitute when no embeddable city webcam exists for that location.
#   The UI can render these differently (e.g., different icon on map pin).
#
# IMPORTANT: YouTube live-stream video IDs can change when streams restart.
# If a YouTube embed stops working, search the source page for an updated ID.
# SkylineWebcams IDs are stable; YouTube IDs extracted from their player are not.

webcams:
  IN:
    # No SkylineWebcams coverage for major Indian cities (only Mount Abu, Nanded)
    # Using YouTube embeds sourced from webcam aggregators
    - city: "Delhi"
      embed_url: "https://www.youtube.com/embed/live_stream?channel=UC_gUM8rL-Lrg6O3adPW9K1g"
      type: "news_fallback"
      lat: 28.6139
      lng: 77.2090
      source: "WION (news — Delhi NCR-based, 24/7 English)"
      notes: >
        No Delhi-specific live webcam found. Using WION (World Is One News),
        headquartered in Noida (Delhi NCR). Channel-based URL is stable.
        Distinct from IN primary (NDTV), IN fallback (India Today), and
        Chennai (ABP News). Replace with a Delhi-specific cam if available.

