# ============================================================================
# RSS Feed Configuration for AI Surveillance News Monitor
# ============================================================================
# Tier rubric:
#   1 = Wire services (highest reliability, broadest distribution)
#   2 = Major international outlets
#   3 = Specialty / digital-rights / cybersecurity
#   4 = Regional sources (drill-down countries + non-English international)
#
# Feed URLs were batch-verified 2026-04-05 via scripts/verify_feeds.py
# (see H14 in docs/BUGLOG.md). 60 of 64 feeds are live. 4 feeds marked
# active: false were disabled because their publishers retired or paywalled
# their RSS endpoints — reactivate them only after confirming a working URL.
# Re-run the verifier periodically: `python scripts/verify_feeds.py`
# ============================================================================

feeds:

