<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI Surveillance Monitor — Choropleth Drill-Down</title>
  <script src="https://unpkg.com/deck.gl@9.1.8/dist.min.js" integrity="sha384-HGiUm4YLHW3nt/0loKSFFg9Lp+mypCx3rms03G28arjEANWuR+RreYt7RcZi8ubz" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; padding: 0; background: #0d1117; overflow: hidden; }
    #map { width: 100%; height: 100vh; }
    #tooltip {
      position: absolute;
      z-index: 10;
      pointer-events: none;
      background: rgba(22, 27, 34, 0.92);
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      display: none;
    }
    #tooltip .tt-region { font-weight: 600; margin-bottom: 2px; }
    #tooltip .tt-count { color: #f85149; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="tooltip">
    <div class="tt-region"></div>
    <div class="tt-count"></div>
  </div>

  <script>
    // Data injected by Streamlit via string replacement
    const ADMIN1_GEOJSON = __ADMIN1_GEOJSON__;
    const REGION_COUNTS = __REGION_COUNTS__;
    const INITIAL_VIEW = __INITIAL_VIEW_STATE__;

    const tooltip = document.getElementById('tooltip');

    // Compute max count for color scaling
    const counts = Object.values(REGION_COUNTS);
    const maxCount = counts.reduce((m, c) => Math.max(m, c || 0), 1);

    function getFillColor(feature) {
      const name = feature.properties.name;
      const count = REGION_COUNTS[name] || 0;
      if (count === 0) {
        // Dim gray for regions with no articles
        return [30, 35, 45, 80];
      }
      // Yellow [255, 215, 0] -> Red [248, 81, 73] gradient based on count
      const t = Math.min(count / maxCount, 1);
      return [
        Math.round(255 + (248 - 255) * t),
        Math.round(215 + (81 - 215) * t),
        Math.round(0 + (73 - 0) * t),
        180
      ];
    }

    const geojsonLayer = new deck.GeoJsonLayer({
      id: 'admin1-choropleth',
      data: ADMIN1_GEOJSON,
      filled: true,
      stroked: true,
      getFillColor: getFillColor,
      getLineColor: [60, 70, 85, 180],
      getLineWidth: 1,
      lineWidthMinPixels: 1,
      pickable: true,
      autoHighlight: true,
      highlightColor: [255, 255, 255, 40],
      onHover: function(info) {
        if (info.object) {
          var name = info.object.properties.name;
          var count = REGION_COUNTS[name] || 0;
          tooltip.style.display = 'block';
          tooltip.style.left = (info.x + 12) + 'px';
          tooltip.style.top = (info.y + 12) + 'px';
          tooltip.querySelector('.tt-region').textContent = name;
          tooltip.querySelector('.tt-count').textContent =
            count + ' article' + (count !== 1 ? 's' : '');
        } else {
          tooltip.style.display = 'none';
        }
      }
    });

    new deck.DeckGL({
      container: 'map',
      // Carto Dark Matter — no API key needed
      mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
      initialViewState: {
        latitude: INITIAL_VIEW.latitude,
        longitude: INITIAL_VIEW.longitude,
        zoom: INITIAL_VIEW.zoom,
        pitch: 0,
        bearing: 0
      },
      controller: true,
      layers: [geojsonLayer]
    });
  </script>
</body>
</html>
