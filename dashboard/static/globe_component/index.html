<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI Surveillance Monitor — Globe View</title>
  <script src="https://unpkg.com/deck.gl@9.1.8/dist.min.js" integrity="sha384-HGiUm4YLHW3nt/0loKSFFg9Lp+mypCx3rms03G28arjEANWuR+RreYt7RcZi8ubz" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; padding: 0; background: #0d1117; overflow: hidden; }
    #globe { width: 100%; height: 100vh; }
    #tooltip {
      position: absolute;
      z-index: 10;
      pointer-events: none;
      background: rgba(22, 27, 34, 0.92);
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      display: none;
    }
    #tooltip .tt-country { font-weight: 600; margin-bottom: 2px; }
    #tooltip .tt-count { color: #f85149; }
  </style>
</head>
<body>
  <div id="globe"></div>
  <div id="tooltip">
    <div class="tt-country"></div>
    <div class="tt-count"></div>
  </div>

  <script>
    // ── Minimal Streamlit Component Protocol ────────────────────────────
    // Implements the three essential postMessage calls so that
    // declare_component() can exchange data with this iframe.

    var Streamlit = {
      setComponentReady: function() {
        window.parent.postMessage({
          isStreamlitMessage: true,
          apiVersion: 1,
          type: 'streamlit:componentReady'
        }, '*');
      },
      setComponentValue: function(value) {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: 'streamlit:setComponentValue',
          value: value,
          dataType: 'json'
        }, '*');
      },
      setFrameHeight: function(height) {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: 'streamlit:setFrameHeight',
          height: height || document.body.scrollHeight
        }, '*');
      },
      RENDER_EVENT: 'streamlit:render',
      events: new EventTarget()
    };

    window.addEventListener('message', function(event) {
      // Only accept messages from the parent frame (Streamlit host).
      // This prevents other tabs, extensions, or local pages from
      // injecting fake render events with crafted article data.
      if (event.source !== window.parent) {
        return;
      }
      if (event.data && event.data.type === Streamlit.RENDER_EVENT) {
        Streamlit.events.dispatchEvent(
          new CustomEvent(Streamlit.RENDER_EVENT, { detail: event.data })
        );
      }
    });

    // ── Globe state ─────────────────────────────────────────────────────
    var tooltip = document.getElementById('tooltip');
    var deckInstance = null;
    var GlobeView = null;

    // Auto-rotation state
    var ROTATION_INCREMENT = 0.03;
    var IDLE_RESUME_MS = 3000;
    var MAX_ROTATION_MS = 60000;
    var currentLongitude = 30;
    var rotating = true;
    var idleTimer = null;
    var rotationStartTime = Date.now();
    var totalRotationElapsed = 0;

    // ── Tooltip helpers ─────────────────────────────────────────────────
    function showTooltip(x, y, countryText, countText) {
      tooltip.style.display = 'block';
      tooltip.style.left = (x + 12) + 'px';
      tooltip.style.top = (y + 12) + 'px';
      tooltip.querySelector('.tt-country').textContent = countryText;
      tooltip.querySelector('.tt-count').textContent = countText || '';
    }

    function hideTooltip() {
      tooltip.style.display = 'none';
    }

    // ── Auto-rotation ───────────────────────────────────────────────────
    function pauseRotation() {
      rotating = false;
      if (idleTimer) clearTimeout(idleTimer);
      idleTimer = setTimeout(function() {
        if (totalRotationElapsed < MAX_ROTATION_MS) {
          rotating = true;
          rotationStartTime = Date.now();
        }
      }, IDLE_RESUME_MS);
    }

    function animateRotation() {
      requestAnimationFrame(animateRotation);
      if (!rotating || document.hidden || !deckInstance) {
        // Always update rotationStartTime so hidden-tab duration is not
        // accumulated into totalRotationElapsed on resume (CC2-H9).
        rotationStartTime = Date.now();
        return;
      }

      var now = Date.now();
      totalRotationElapsed += now - rotationStartTime;
      rotationStartTime = now;

      if (totalRotationElapsed >= MAX_ROTATION_MS) {
        rotating = false;
        return;
      }

      currentLongitude += ROTATION_INCREMENT;
      if (currentLongitude > 180) currentLongitude -= 360;

      deckInstance.setProps({
        initialViewState: {
          latitude: 20,
          longitude: currentLongitude,
          zoom: 1.2,
          transitionDuration: 0
        }
      });
    }

    var interactionEvents = ['mousedown', 'wheel', 'touchstart', 'pointerdown'];
    interactionEvents.forEach(function(evt) {
      document.addEventListener(evt, pauseRotation, { passive: true });
    });

    document.addEventListener('visibilitychange', function() {
      if (!document.hidden && rotating) {
        rotationStartTime = Date.now();
      }
    });

    // ── Build layers from args ──────────────────────────────────────────
    // Separated so layers can be rebuilt on rerender without recreating
    // the entire deck.gl instance.

    function buildLayers(articleData, countriesGeojson, focusCountries) {
      var focusSet = new Set(focusCountries);
      var maxCount = articleData.reduce(function(m, d) {
        return Math.max(m, d.count || 0);
      }, 1);

      function getColor(count) {
        var t = Math.min(count / maxCount, 1);
        return [
          Math.round(255 + (248 - 255) * t),
          Math.round(215 + (81 - 215) * t),
          Math.round(0 + (73 - 0) * t),
          200
        ];
      }

      function getRadius(count) {
        var t = Math.min(count / maxCount, 1);
        return 20000 + t * 100000;
      }

      var countryLayer = new deck.GeoJsonLayer({
        id: 'country-polygons',
        data: countriesGeojson,
        filled: true,
        stroked: true,
        getFillColor: function(feature) {
          var iso2 = feature.properties.iso2 || feature.properties.ISO_A2 || '';
          if (focusSet.has(iso2)) return [248, 81, 73, 120];
          return [20, 25, 35, 200];
        },
        getLineColor: [40, 50, 65, 150],
        getLineWidth: 1,
        lineWidthMinPixels: 1,
        pickable: true,
        autoHighlight: true,
        highlightColor: [255, 255, 255, 40],
        onHover: function(info) {
          if (info.object) {
            var props = info.object.properties;
            var name = props.NAME || props.ADMIN || 'Unknown';
            var iso2 = props.iso2 || props.ISO_A2 || '';
            var hint = focusSet.has(iso2) ? ' (click to drill down)' : '';
            showTooltip(info.x, info.y, name + hint, '');
          } else {
            hideTooltip();
          }
        },
        onClick: function(info) {
          if (info.object) {
            var iso2 = info.object.properties.iso2 || info.object.properties.ISO_A2 || '';
            if (focusSet.has(iso2) && /^[A-Z]{2}$/.test(iso2)) {
              Streamlit.setComponentValue(iso2);
            }
          }
        }
      });

      var scatterLayer = new deck.ScatterplotLayer({
        id: 'surveillance-scatter',
        data: articleData,
        getPosition: function(d) { return [d.lng, d.lat]; },
        getRadius: function(d) { return getRadius(d.count); },
        getFillColor: function(d) { return getColor(d.count); },
        pickable: true,
        opacity: 0.8,
        radiusMinPixels: 5,
        radiusMaxPixels: 40,
        onHover: function(info) {
          if (info.object) {
            var d = info.object;
            showTooltip(
              info.x, info.y,
              d.country_name + ' (' + d.country_code + ')',
              d.count + ' article' + (d.count !== 1 ? 's' : '')
            );
          } else {
            hideTooltip();
          }
        }
      });

      return [countryLayer, scatterLayer];
    }

    // ── Render handler — called each time Streamlit sends (new) args ────
    function onRender(event) {
      var args = event.detail.args;
      if (!args) return;

      var articleData = args.article_data || [];
      var countriesGeojson = args.countries_geojson || {
        type: 'FeatureCollection', features: []
      };
      var focusCountries = args.focus_countries || [];
      var componentHeight = args.height || 550;

      var layers = buildLayers(articleData, countriesGeojson, focusCountries);

      if (!deckInstance) {
        // First render — create the deck.gl instance
        GlobeView = deck.GlobeView || deck._GlobeView;
        if (!GlobeView) {
          document.getElementById('globe').innerHTML =
            '<p style="color:#8b949e;text-align:center;padding:40px;">' +
            'Globe view unavailable — deck.gl GlobeView not found.</p>';
          Streamlit.setFrameHeight(componentHeight);
          return;
        }
        if (GlobeView) {
          deckInstance = new deck.DeckGL({
            container: 'globe',
            views: new GlobeView({ resolution: 10 }),
            initialViewState: {
              latitude: 20,
              longitude: 30,
              zoom: 1.2
            },
            controller: true,
            layers: layers,
            parameters: {
              clearColor: [13 / 255, 17 / 255, 23 / 255, 1]
            }
          });

          rotationStartTime = Date.now();
          animateRotation();
        }
      } else {
        // Subsequent render — update layers with new data
        deckInstance.setProps({ layers: layers });
      }

      Streamlit.setFrameHeight(componentHeight);
    }

    // Register render handler and signal ready
    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
    Streamlit.setComponentReady();
  </script>
</body>
</html>
